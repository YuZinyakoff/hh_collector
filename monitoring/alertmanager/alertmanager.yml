global:
  resolve_timeout: 5m

route:
  receiver: hhru-platform-webhook
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: hhru-platform-webhook
    webhook_configs:
      - url: http://alert-webhook:8010/alertmanager
        send_resolved: true
